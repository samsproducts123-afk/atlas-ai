<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas AI</title>
    <meta name="description" content="Atlas AI - Your personal AI assistant">
    <meta name="theme-color" content="#09090B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Atlas AI">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--p:#7C3AED;--pl:#A78BFA;--a:#10B981;--bg:#09090B;--card:#141416;--cb:rgba(255,255,255,0.06);--t:#FAFAFA;--m:#71717A}
        body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--t);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
        
        /* HEADER */
        .header{padding:12px 16px;background:rgba(9,9,11,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--cb);display:flex;align-items:center;gap:12px;flex-shrink:0}
        .header-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--a));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700}
        .header-info h1{font-size:15px;font-weight:700}
        .header-info span{font-size:11px;color:var(--a);font-weight:500}
        .header-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--m)}
        .header-status .dot{width:6px;height:6px;border-radius:50%;background:var(--a)}
        .header-status.offline .dot{background:#EF4444}

        /* MESSAGES */
        .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
        .msg{max-width:85%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;word-wrap:break-word;animation:fadeIn .2s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .msg-user{background:var(--p);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
        .msg-bot{background:var(--card);border:1px solid var(--cb);align-self:flex-start;border-bottom-left-radius:4px}
        .msg-bot pre{background:rgba(0,0,0,.3);padding:8px 10px;border-radius:8px;overflow-x:auto;font-size:12px;margin:6px 0}
        .msg-bot code{font-size:12px;background:rgba(0,0,0,.2);padding:1px 4px;border-radius:3px}
        .msg-time{font-size:10px;color:var(--m);margin-top:2px;padding:0 4px}
        .msg-time.right{text-align:right}
        .typing{align-self:flex-start;padding:12px 18px;background:var(--card);border:1px solid var(--cb);border-radius:16px;border-bottom-left-radius:4px;display:none;gap:4px}
        .typing span{width:6px;height:6px;border-radius:50%;background:var(--m);animation:bounce 1.4s infinite}
        .typing span:nth-child(2){animation-delay:.2s}
        .typing span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

        /* WELCOME */
        .welcome{text-align:center;padding:40px 20px;color:var(--m)}
        .welcome-icon{font-size:48px;margin-bottom:16px}
        .welcome h2{font-size:20px;font-weight:700;color:var(--t);margin-bottom:8px}
        .welcome p{font-size:13px;line-height:1.6;max-width:300px;margin:0 auto 20px}
        .quick-actions{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
        .quick-btn{padding:6px 12px;background:var(--card);border:1px solid var(--cb);border-radius:20px;font-size:12px;color:var(--m);cursor:pointer;transition:all .2s;font-family:inherit}
        .quick-btn:hover{border-color:var(--p);color:var(--t)}

        /* INPUT */
        .input-area{padding:12px 16px;background:rgba(9,9,11,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--cb);flex-shrink:0}
        .input-row{display:flex;gap:8px;align-items:flex-end;max-width:800px;margin:0 auto}
        .input-row textarea{flex:1;background:var(--card);border:1px solid var(--cb);border-radius:12px;padding:10px 14px;color:var(--t);font-size:14px;font-family:inherit;resize:none;outline:none;max-height:120px;min-height:42px;line-height:1.4;transition:border-color .2s}
        .input-row textarea:focus{border-color:var(--p)}
        .input-row textarea::placeholder{color:var(--m)}
        .send-btn{width:42px;height:42px;border-radius:12px;background:var(--p);border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
        .send-btn:hover{background:#6D28D9}
        .send-btn:disabled{opacity:.4;cursor:not-allowed}
        .input-hint{text-align:center;padding:6px 0 2px;font-size:10px;color:var(--m)}

        /* CONFIG MODAL */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
        .modal-overlay.show{display:flex}
        .modal{background:#1A1A1E;border:1px solid var(--cb);border-radius:20px;padding:28px;max-width:420px;width:100%}
        .modal h2{font-size:18px;font-weight:700;margin-bottom:4px}
        .modal p{font-size:13px;color:var(--m);margin-bottom:20px}
        .modal label{font-size:12px;font-weight:600;color:var(--m);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px}
        .modal input{width:100%;background:var(--card);border:1px solid var(--cb);border-radius:10px;padding:10px 14px;color:var(--t);font-size:14px;font-family:inherit;outline:none;margin-bottom:16px}
        .modal input:focus{border-color:var(--p)}
        .modal-btns{display:flex;gap:8px;margin-top:8px}
        .modal-btns button{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
        .modal-btns .btn-save{background:var(--p);color:#fff}
        .modal-btns .btn-cancel{background:var(--card);color:var(--m);border:1px solid var(--cb)}

        /* RESPONSIVE */
        @media(min-width:768px){
            .messages{padding:16px calc(50% - 400px)}
            .msg{max-width:70%}
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-avatar">A</div>
    <div class="header-info">
        <h1>Atlas AI</h1>
        <span>Online</span>
    </div>
    <div class="header-status" id="status">
        <span class="dot"></span>
        <span>Connected</span>
    </div>
    <button onclick="showConfig()" style="background:none;border:none;color:var(--m);font-size:18px;cursor:pointer;padding:4px 8px">⚙️</button>
</div>

<div class="messages" id="messages">
    <div class="welcome" id="welcome">
        <div class="welcome-icon">⚡</div>
        <h2>Welcome to Atlas AI</h2>
        <p>Your personal AI assistant with 32+ tools. Ask me anything or try a quick action below.</p>
        <div class="quick-actions">
            <button class="quick-btn" onclick="sendQuick('What is the weather in Paris?')">☔ Weather</button>
            <button class="quick-btn" onclick="sendQuick('Give me my daily briefing')">📊 Daily Briefing</button>
            <button class="quick-btn" onclick="sendQuick('Bitcoin price?')">💰 Crypto</button>
            <button class="quick-btn" onclick="sendQuick('Tell me a joke')">😂 Joke</button>
            <button class="quick-btn" onclick="sendQuick('Generate an image of a sunset')">🎨 Image</button>
            <button class="quick-btn" onclick="sendQuick('Translate hello to French')">🌍 Translate</button>
        </div>
    </div>
    <div class="typing" id="typing"><span></span><span></span><span></span></div>
</div>

<div class="input-area">
    <div class="input-row">
        <textarea id="input" placeholder="Message Atlas..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
    <div class="input-hint">Atlas AI - 32+ tools, 70+ languages, persistent memory</div>
</div>

<!-- CONFIG MODAL -->
<div class="modal-overlay" id="configModal">
    <div class="modal">
        <h2>⚙️ Connect to Atlas</h2>
        <p>Enter your Atlas server URL and auth token to start chatting.</p>
        <label>Server URL</label>
        <input id="cfgUrl" placeholder="https://your-atlas.trycloudflare.com" value="">
        <label>Auth Token</label>
        <input id="cfgToken" type="password" placeholder="Your gateway auth token">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="hideConfig()">Cancel</button>
            <button class="btn-save" onclick="saveConfig()">Connect</button>
        </div>
    </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');
const welcomeEl = document.getElementById('welcome');
const statusEl = document.getElementById('status');

let API_URL = localStorage.getItem('atlas_url') || '';
let API_TOKEN = localStorage.getItem('atlas_token') || '';

if (!API_URL || !API_TOKEN) {
    setTimeout(() => document.getElementById('configModal').classList.add('show'), 500);
}

inputEl.addEventListener('input', () => {
    sendBtn.disabled = !inputEl.value.trim();
});

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (inputEl.value.trim()) sendMessage();
    }
}

function sendQuick(text) {
    inputEl.value = text;
    sendMessage();
}

function addMessage(text, isUser) {
    if (welcomeEl) welcomeEl.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');
    msg.innerHTML = isUser ? escapeHtml(text) : formatResponse(text);
    messagesEl.insertBefore(msg, typingEl);
    
    const time = document.createElement('div');
    time.className = 'msg-time' + (isUser ? ' right' : '');
    time.textContent = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    messagesEl.insertBefore(time, typingEl);
    
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatResponse(text) {
    // Basic markdown: bold, code blocks, inline code
    text = escapeHtml(text);
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n/g, '<br>');
    return text;
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    
    addMessage(text, true);
    typingEl.style.display = 'flex';
    messagesEl.scrollTop = messagesEl.scrollHeight;
    
    try {
        const res = await fetch(API_URL + '/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + API_TOKEN
            },
            body: JSON.stringify({
                model: 'openclaw',
                messages: [{role: 'user', content: text}]
            })
        });
        
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || 'No response received.';
        
        typingEl.style.display = 'none';
        addMessage(reply, false);
        statusEl.innerHTML = '<span class="dot"></span><span>Connected</span>';
        statusEl.className = 'header-status';
    } catch (err) {
        typingEl.style.display = 'none';
        addMessage('Connection error: ' + err.message + '. Check your server URL and token in settings (⚙️).', false);
        statusEl.innerHTML = '<span class="dot"></span><span>Disconnected</span>';
        statusEl.className = 'header-status offline';
    }
}

function showConfig() {
    document.getElementById('cfgUrl').value = API_URL;
    document.getElementById('cfgToken').value = API_TOKEN;
    document.getElementById('configModal').classList.add('show');
}

function hideConfig() {
    document.getElementById('configModal').classList.remove('show');
}

function saveConfig() {
    API_URL = document.getElementById('cfgUrl').value.trim().replace(/\/+$/, '');
    API_TOKEN = document.getElementById('cfgToken').value.trim();
    localStorage.setItem('atlas_url', API_URL);
    localStorage.setItem('atlas_token', API_TOKEN);
    hideConfig();
    addMessage('Connected to Atlas! Try saying hello.', false);
    statusEl.innerHTML = '<span class="dot"></span><span>Connected</span>';
    statusEl.className = 'header-status';
}

// Register service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
